<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAUST — Payment Plan</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f4f0;
      color: #1e1e1e;
      padding: 48px 24px;
    }
    .container { max-width: 860px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 24px; color: #1e1e1e; }

    /* Metric cards */
    .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
    .metric {
      background: #fff;
      border: 1px solid #d8d6ce;
      border-radius: 10px;
      padding: 16px 18px;
    }
    .metric-label { font-size: 12px; color: #636158; margin-bottom: 6px; }
    .metric-value { font-size: 17px; font-weight: 600; color: #1e1e1e; }

    /* Table */
    .tbl-wrap {
      border: 1px solid #d8d6ce;
      border-radius: 10px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #eeede9;
      font-size: 12px;
      font-weight: 600;
      color: #636158;
      padding: 11px 16px;
      text-align: left;
      border-bottom: 1px solid #d8d6ce;
    }
    thead th.amt { text-align: right; }

    /* Semester rows */
    tr.fall td {
      background: #e6f1fb;
      color: #185fa5;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 7px 16px;
      border-top: 1px solid #d8d6ce;
    }
    tr.spring td {
      background: #e1f5ee;
      color: #0f6e56;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 7px 16px;
      border-top: 1px solid #d8d6ce;
    }
    tr.fall td span, tr.spring td span {
      font-weight: 400;
      font-size: 11px;
      margin-left: 8px;
      text-transform: none;
      letter-spacing: 0;
      opacity: 0.8;
    }

    /* Data rows */
    tr.data-row td {
      padding: 12px 16px;
      border-top: 1px solid #d8d6ce;
      font-size: 13px;
      background: #fff;
    }
    tr.data-row td .inst-label { font-weight: 600; }
    tr.data-row td .inst-note { font-size: 12px; color: #636158; margin-top: 2px; }
    tr.data-row td.amt { text-align: right; font-weight: 600; }

    /* Total row */
    tr.total-row td {
      background: #eeede9;
      padding: 13px 16px;
      font-size: 13px;
      font-weight: 700;
      border-top: 1px solid #d8d6ce;
    }
    tr.total-row td.amt { text-align: right; }

    @media (max-width: 600px) {
      .metrics { grid-template-columns: 1fr; }
      table { min-width: 480px; }
      .tbl-wrap { overflow-x: auto; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>DAUST &mdash; Payment Plan</h1>

    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Yearly tuition</div>
        <div class="metric-value">2 975 000 FCFA</div>
      </div>
      <div class="metric">
        <div class="metric-label">Yearly housing</div>
        <div class="metric-value">680 000 FCFA</div>
      </div>
      <div class="metric">
        <div class="metric-label">Yearly cafeteria</div>
        <div class="metric-value">630 000 FCFA</div>
      </div>
    </div>

    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:30%">Installment</th>
            <th class="amt">Tuition + cafeteria + housing</th>
            <th class="amt">Tuition only</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const plans = [
      2975000 + 630000 + 680000,
      2975000,
    ];
    const fmt = n => n.toLocaleString('fr-FR') + ' FCFA';
    const tbody = document.getElementById('tbody');

    function semRow(label, period, cls) {
      const tr = document.createElement('tr');
      tr.className = cls;
      tr.innerHTML = `<td colspan="3">${label}<span>${period}</span></td>`;
      tbody.appendChild(tr);
    }

    function dataRow(label, note) {
      const tr = document.createElement('tr');
      tr.className = 'data-row';
      tr.innerHTML = `<td><div class="inst-label">${label}</div><div class="inst-note">${note}</div></td>` +
        plans.map(t => `<td class="amt">${fmt(Math.round(t / 4))}</td>`).join('');
      tbody.appendChild(tr);
    }

    semRow('Fall Semester', 'September – December', 'fall');
    dataRow('Inscription', 'At enrolment');
    dataRow('2nd installment', 'November 5th');
    semRow('Spring Semester', 'January – May', 'spring');
    dataRow('3rd installment', 'January 5th');
    dataRow('4th installment', 'March 5th');

    const totRow = document.createElement('tr');
    totRow.className = 'total-row';
    totRow.innerHTML = `<td>Annual total</td>` +
      plans.map(t => `<td class="amt">${fmt(t)}</td>`).join('');
    tbody.appendChild(totRow);
  </script>
</body>
</html>
