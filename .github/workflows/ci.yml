name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Workspace consumers typecheck against built artifacts: shared's .d.ts and
      # the generated Prisma client. DATABASE_URL is a dummy (generate needs the
      # schema, not a live DB).
      - name: Build workspace packages
        run: |
          pnpm --filter @mydaust/shared run build
          DATABASE_URL="postgresql://x:x@localhost:5432/x" pnpm --filter @mydaust/db run build

      - name: Typecheck (all packages)
        run: pnpm -r typecheck

      - name: Unit tests (shared)
        run: pnpm --filter @mydaust/shared exec vitest run

      - name: Unit tests (api)
        run: pnpm --filter @mydaust/api exec vitest run
