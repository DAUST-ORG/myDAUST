<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>DAUST — Teacher Portal</title>
<link rel="stylesheet" href="assets/colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: 'Montserrat', system-ui, sans-serif;
    background: #e7ecf1;
    background-image: radial-gradient(circle at 50% 0%, #eef2f6 0%, #dde4ec 70%);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
  }
  #stage { transform-origin: center center; }
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>
<div id="stage"><div id="root"></div></div>

<script type="text/babel" src="frames/ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app/data.jsx"></script>
<script type="text/babel" src="app/ui.jsx"></script>
<script type="text/babel" src="app/home.jsx"></script>
<script type="text/babel" src="app/classes.jsx"></script>
<script type="text/babel" src="app/comms.jsx"></script>
<script type="text/babel" src="app/more.jsx"></script>
<script type="text/babel" src="app/app.jsx"></script>

<script>
  function fitStage() {
    var stage = document.getElementById('stage');
    if (!stage) return;
    var s = Math.min(1, (window.innerWidth - 24) / 402, (window.innerHeight - 24) / 874);
    stage.style.transform = 'scale(' + s + ')';
  }
  window.addEventListener('resize', fitStage);
  fitStage();
  setTimeout(fitStage, 400);
  setTimeout(fitStage, 1200);
</script>
</body>
</html>
