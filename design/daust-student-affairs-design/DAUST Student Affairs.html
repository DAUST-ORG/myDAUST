<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DAUST · Student Affairs</title>
<link rel="icon" href="assets/logo-daust-capsule.png">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap">
<style>
@font-face {
  font-family: 'Saira';
  src: url('fonts/Saira-VariableFont_wdth_wght.ttf') format('truetype-variations');
  font-weight: 100 900; font-stretch: 50% 125%; font-style: normal; font-display: swap;
}
html, body { margin: 0; padding: 0; background: #f5f7f9; font-family: 'Montserrat', system-ui, sans-serif; color: #141a21; -webkit-font-smoothing: antialiased; }
*, *::before, *::after { box-sizing: border-box; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: #bcc6d1; border-radius: 999px; border: 3px solid #f5f7f9; }
::-webkit-scrollbar-track { background: transparent; }
@keyframes daustPulse { 0%,100% { opacity: 1 } 50% { opacity: 0.25 } }
#root h1, #root h2, #root h3 { font-family: 'Saira', system-ui, sans-serif; letter-spacing: 0.01em; }
@keyframes daustSlideIn { from { transform: translateX(30px); opacity: 0 } to { transform: translateX(0); opacity: 1 } }
@keyframes daustSlideUp { from { transform: translate(-50%, 16px); opacity: 0 } to { transform: translate(-50%, 0); opacity: 1 } }
@keyframes daustFade { from { opacity: 0; transform: translateY(6px) } to { opacity: 1; transform: translateY(0) } }
.daust-view { animation: daustFade 280ms cubic-bezier(0.16,1,0.3,1); }
</style>
<script src="https://unpkg.com/lucide@latest"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react" src="src/app.jsx"></script>
</body>
</html>
