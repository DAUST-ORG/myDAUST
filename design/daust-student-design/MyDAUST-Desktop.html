<script>
  /* Suppress the benign "ResizeObserver loop completed with undelivered
     notifications" notice (a harness/browser false-positive, not a real error). */
  (function () {
    var RO = 'ResizeObserver loop';
    var hit = function (m) { return typeof m === 'string' && m.indexOf(RO) !== -1; };
    window.addEventListener('error', function (e) {
      if (e && hit(e.message)) { e.stopImmediatePropagation(); e.preventDefault(); return false; }
    }, true);
    var _oe = window.onerror;
    window.onerror = function (m) { if (hit(m)) return true; return _oe ? _oe.apply(this, arguments) : false; };
    var _ce = console.error;
    console.error = function () { if (arguments[0] && hit(String(arguments[0]))) return; return _ce.apply(console, arguments); };
  })();
</script>

  .d-fade { animation: none; }

  .dlg-pop { animation: dPop .26s cubic-bezier(.2,.9,.3,1); }

  @keyframes pIn { from { transform: scale(.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>
