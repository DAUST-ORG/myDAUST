<script>
  /* Suppress the benign "ResizeObserver loop completed with undelivered
     notifications" notice (a known browser/harness false-positive — it does
     not indicate a real error). */
  window.addEventListener('error', function (e) {
    if (e && e.message && e.message.indexOf('ResizeObserver loop') !== -1) {
      e.stopImmediatePropagation();
      e.preventDefault();
    }
  });
</script>
<link rel="stylesheet" href="daust/colors_and_type.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: #0a1424;
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  button { -webkit-tap-highlight-color: transparent; font-family: var(--font-body); }
  #root { min-height: 100%; }

  /* hide scrollbars inside the device for a native feel */
  .screen-anim { scrollbar-width: none; -ms-overflow-style: none; }
  .screen-anim::-webkit-scrollbar { display: none; width: 0; height: 0; }

  /* transitions — transform-only so content stays visible even if the
     animation is paused (e.g. backgrounded iframe); never gate paint on opacity */
  .screen-anim { animation: scrIn .30s cubic-bezier(.2,.7,.3,1); }
  @keyframes scrIn { from { transform: translateX(10px); } to { transform: none; } }
  .sheet-up { animation: sheetUp .34s cubic-bezier(.2,.7,.3,1); }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: none; } }
  .sheet-scrim { animation: fadeIn .26s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .pop-in { animation: pop .4s cubic-bezier(.2,1.4,.4,1); }
  @keyframes pop { from { transform: scale(.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>
