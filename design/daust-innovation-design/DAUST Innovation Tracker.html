<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DAUST Innovation Tracker</title>
  <link rel="stylesheet" href="assets/colors_and_type.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #f5f7f9; }
    body { font-family: 'Montserrat', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; }
    select { font-family: 'Montserrat', system-ui, sans-serif; }
    ::selection { background: #ed842533; }
    button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible { outline: 2px solid #ed8425; outline-offset: 1px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin-icon { animation: spin 1.2s linear infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#153b6a"/>
      <g transform="translate(30 38)">
        <rect x="0" y="0" width="40" height="6" rx="3" fill="#153b6a"/>
        <rect x="0" y="0" width="11" height="6" rx="3" fill="#fff"/>
        <rect x="14" y="0" width="11" height="6" rx="3" fill="#ed8425"/>
        <rect x="28" y="0" width="11" height="6" rx="3" fill="#9da6ae"/>
        <rect x="0" y="14" width="40" height="6" rx="3" fill="#2a4f7d"/>
        <rect x="0" y="14" width="26" height="6" rx="3" fill="#ed8425"/>
      </g>
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="app/data.jsx"></script>
  <script type="text/babel" src="app/ui.jsx"></script>
  <script type="text/babel" src="app/shell.jsx"></script>
  <script type="text/babel" src="app/student.jsx"></script>
  <script type="text/babel" src="app/admin.jsx"></script>
  <script type="text/babel" src="app/admin-detail.jsx"></script>
  <script type="text/babel" src="app/tweaks-panel.jsx"></script>
  <script type="text/babel" src="app/app.jsx"></script>
</body>
</html>
