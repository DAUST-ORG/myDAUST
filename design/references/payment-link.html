document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n:root{\n  --navy:#153b6a; --navy-deep:#0f2c50; --navy-700:#1d4a82;\n  --orange:#ed8425; --orange-600:#d6731a; --steel:#9da6ae;\n  --bg:#eef1f5; --surface:#ffffff; --sunk:#f5f7f9;\n  --border:#d7dee6; --border-strong:#bcc6d1;\n  --fg1:#141a21; --fg2:#4d5965; --fg3:#6c7884;\n  --on-navy:#ffffff; --on-navy-muted:#b9c4d4;\n  --success:#2e7d52; --warning:#ed8425; --danger:#c0392b;\n  --font-display:'Saira',system-ui,sans-serif;\n  --font-body:'Montserrat',system-ui,-apple-system,sans-serif;\n  --radius-sm:8px; --radius-md:14px; --radius-lg:20px; --radius-pill:999px;\n  --shadow-navy:0 24px 60px rgba(15,44,80,.22),0 4px 14px rgba(15,44,80,.10);\n  --shadow-sm:0 1px 3px rgba(15,44,80,.10);\n}\n*{box-sizing:border-box;margin:0;padding:0}\nhtml,body{height:100%}\nbody{\n  font-family:var(--font-body); color:var(--fg1); background:var(--bg);\n  -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;\n  min-height:100%; display:flex; flex-direction:column;\n  background-image:radial-gradient(circle at 15% -10%,rgba(21,59,106,.06),transparent 45%),radial-gradient(circle at 100% 0,rgba(237,132,37,.05),transparent 40%);\n}\nbutton{font-family:inherit;cursor:pointer;border:none;background:none}\ninput{font-family:inherit}\n\n/* ---------- Top bar ---------- */\n.topbar{\n  height:60px; background:var(--navy); display:flex; align-items:center;\n  justify-content:space-between; padding:0 clamp(16px,4vw,40px); flex-shrink:0;\n}\n.topbar img{height:30px;width:auto;display:block}\n.secure-chip{\n  display:inline-flex; align-items:center; gap:7px; color:var(--on-navy-muted);\n  font-size:12.5px; font-weight:600; letter-spacing:.02em;\n}\n.secure-chip svg{width:15px;height:15px}\n\n/* ---------- Layout ---------- */\nmain{flex:1;display:flex;align-items:center;justify-content:center;padding:clamp(16px,4vw,44px)}\n.card{\n  width:100%; max-width:940px; background:var(--surface); border-radius:var(--radius-lg);\n  box-shadow:var(--shadow-navy); overflow:hidden; display:grid; grid-template-columns:minmax(0,380px) minmax(0,1fr);\n  animation:rise .5s cubic-bezier(.16,1,.3,1);\n}\n@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}\n@media(max-width:760px){ .card{grid-template-columns:1fr; max-width:460px} }\n\n/* ---------- Summary (navy) ---------- */\n.summary{\n  background:linear-gradient(158deg,var(--navy-deep) 0%,var(--navy) 64%,var(--navy-700) 100%);\n  color:var(--on-navy); padding:32px 30px; position:relative; overflow:hidden;\n  display:flex; flex-direction:column; gap:22px;\n}\n.summary::after{ /* faint watermark D */\n  content:\"D\"; position:absolute; right:-24px; bottom:-70px; font-family:var(--font-display);\n  font-weight:800; font-size:260px; line-height:.8; color:rgba(255,255,255,.045); pointer-events:none;\n}\n.eyebrow{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--orange)}\n.tri-dash{display:flex;gap:5px}\n.tri-dash span{height:4px;width:22px;border-radius:2px}\n.tri-dash span:nth-child(1){background:#fff}\n.tri-dash span:nth-child(2){background:var(--orange)}\n.tri-dash span:nth-child(3){background:var(--steel)}\n.amt-label{font-size:12.5px;color:var(--on-navy-muted);font-weight:500}\n.amt{font-family:var(--font-display);font-weight:800;font-size:clamp(34px,6vw,44px);letter-spacing:.01em;line-height:1;margin-top:4px}\n.amt small{font-size:.4em;font-weight:600;color:var(--on-navy-muted);margin-left:6px;letter-spacing:.04em}\n.due-chip{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.10);border-radius:var(--radius-pill);padding:6px 13px;font-size:12.5px;font-weight:600;width:fit-content;margin-top:12px}\n.due-chip svg{width:14px;height:14px;color:var(--orange)}\n.divider{height:1px;background:rgba(255,255,255,.14)}\n\n.profile{display:flex;align-items:center;gap:13px}\n.avatar{width:46px;height:46px;border-radius:50%;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;flex-shrink:0;font-family:var(--font-display)}\n.profile .pname{font-weight:700;font-size:15.5px}\n.profile .pmeta{font-size:12.5px;color:var(--on-navy-muted);margin-top:1px}\n\n.breakdown{display:flex;flex-direction:column;gap:2px}\n.breakdown .brow{display:flex;justify-content:space-between;font-size:13px;padding:7px 0;color:var(--on-navy-muted)}\n.breakdown .brow b{color:#fff;font-weight:600;font-variant-numeric:tabular-nums}\n.breakdown .brow.total{border-top:1px solid rgba(255,255,255,.14);margin-top:4px;padding-top:11px;color:#fff;font-weight:700;font-size:14px}\n.ref-note{font-size:11.5px;color:var(--on-navy-muted);display:flex;align-items:center;gap:6px}\n.ref-note svg{width:13px;height:13px;flex-shrink:0}\n\n/* ---------- Form side ---------- */\n.form{padding:32px clamp(22px,3.4vw,36px);display:flex;flex-direction:column;min-height:520px}\n.form h1{font-family:var(--font-display);font-weight:700;font-size:21px;letter-spacing:.01em}\n.form .sub{color:var(--fg3);font-size:13px;margin-top:4px;margin-bottom:22px}\n\n.methods{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:20px}\n.method{\n  display:flex;align-items:center;gap:11px;padding:13px 14px;border:1.5px solid var(--border);\n  border-radius:var(--radius-md);background:var(--surface);text-align:left;transition:all .16s cubic-bezier(.2,.7,.3,1);position:relative;\n}\n.method:hover{border-color:var(--border-strong);background:var(--sunk)}\n/* inactive: once any method is chosen, the un-chosen ones recede */\n.methods.has-selection .method{opacity:.5;filter:saturate(.6)}\n.methods.has-selection .method:hover{opacity:.85;filter:none}\n/* active */\n.method[aria-pressed=\"true\"]{border-color:var(--navy);border-width:2px;background:#eaf0f8;box-shadow:0 0 0 3px rgba(21,59,106,.12);opacity:1;filter:none;padding:12px 13px}\n.method[aria-pressed=\"true\"] .mlabel{color:var(--navy);font-weight:700}\n.method .glyph{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:11px;flex-shrink:0;letter-spacing:.02em}\n.method .mlabel{display:block;font-size:13.5px;font-weight:600;color:var(--fg1);line-height:1.2}\n.method .mmeta{display:block;font-size:11px;color:var(--fg3);margin-top:2px}\n.method>span:nth-child(2){min-width:0}\n.method .tick{position:absolute;top:9px;right:9px;width:16px;height:16px;color:var(--navy);opacity:0;transition:opacity .15s}\n.method[aria-pressed=\"true\"] .tick{opacity:1}\n\n.panel{background:var(--sunk);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;margin-bottom:18px;animation:fade .25s ease}\n@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}\n.field{display:flex;flex-direction:column;gap:6px;margin-bottom:13px}\n.field:last-child{margin-bottom:0}\n.field label{font-size:12px;font-weight:600;color:var(--fg2)}\n.field input{padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;color:var(--fg1);background:#fff;outline:none;transition:border-color .15s,box-shadow .15s}\n.field input:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(21,59,106,.12)}\n.field .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}\n.hint{font-size:12px;color:var(--fg3);display:flex;align-items:flex-start;gap:7px;line-height:1.45}\n.hint svg{width:14px;height:14px;flex-shrink:0;margin-top:1px;color:var(--navy)}\n.bankline{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:8px 0;border-bottom:1px solid var(--border)}\n.bankline:last-child{border-bottom:none}\n.bankline span{color:var(--fg3)}\n.bankline b{color:var(--fg1);font-weight:600;font-family:var(--font-body)}\n.upload{margin-top:13px;display:flex;align-items:center;gap:10px;padding:13px 14px;border:1.5px dashed var(--border-strong);border-radius:var(--radius-sm);background:#fff;cursor:pointer;transition:border-color .15s,background .15s,color .15s;font-size:13px;color:var(--fg2);font-weight:600}\n.upload:hover{border-color:var(--navy);background:var(--sunk)}\n.upload svg{width:18px;height:18px;color:var(--navy);flex-shrink:0}\n.upload em{font-style:normal;color:var(--fg3);font-weight:500}\n.upload.done{border-style:solid;border-color:var(--success);color:var(--success);background:rgba(46,125,82,.06)}\n.upload.done svg{color:var(--success)}\n.copy-btn{color:var(--navy);font-weight:600;font-size:12px;display:inline-flex;align-items:center;gap:4px}\n\n.spacer{flex:1}\n.pay-btn{\n  width:100%;background:var(--orange);color:#fff;font-weight:700;font-size:16px;\n  padding:15px;border-radius:var(--radius-pill);display:flex;align-items:center;justify-content:center;gap:9px;\n  transition:background .16s,transform .1s;font-family:var(--font-body);letter-spacing:.01em;\n}\n.pay-btn:hover{background:var(--orange-600)}\n.pay-btn:active{transform:scale(.99)}\n.pay-btn:disabled{background:var(--border-strong);cursor:not-allowed}\n.pay-btn svg{width:18px;height:18px}\n.foot-secure{margin-top:15px;text-align:center;font-size:11.5px;color:var(--fg3);display:flex;align-items:center;justify-content:center;gap:6px;line-height:1.5}\n.foot-secure svg{width:13px;height:13px;color:var(--success)}\n\n/* ---------- Processing ---------- */\n.processing{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:20px;padding:20px}\n.pulse-ring{width:92px;height:92px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}\n.pulse-ring .glyph-lg{width:60px;height:60px;border-radius:16px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;z-index:1}\n.pulse-ring::before,.pulse-ring::after{content:\"\";position:absolute;inset:0;border-radius:50%;border:2px solid var(--navy);opacity:0;animation:pring 1.8s ease-out infinite}\n.pulse-ring::after{animation-delay:.9s}\n@keyframes pring{0%{transform:scale(.7);opacity:.5}100%{transform:scale(1.25);opacity:0}}\n.processing h2{font-family:var(--font-display);font-weight:700;font-size:19px}\n.processing p{color:var(--fg3);font-size:13.5px;max-width:32ch}\n.dots{display:inline-flex;gap:5px;margin-top:2px}\n.dots i{width:7px;height:7px;border-radius:50%;background:var(--navy);animation:bd 1.2s ease-in-out infinite}\n.dots i:nth-child(2){animation-delay:.2s}.dots i:nth-child(3){animation-delay:.4s}\n@keyframes bd{0%,100%{opacity:.25;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}\n.phone-note{background:var(--sunk);border:1px solid var(--border);border-radius:var(--radius-md);padding:13px 16px;font-size:12.5px;color:var(--fg2);display:flex;align-items:center;gap:10px;max-width:320px}\n.phone-note svg{width:20px;height:20px;color:var(--orange);flex-shrink:0}\n\n/* ---------- Success ---------- */\n.success{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;padding:8px 4px;animation:fade .35s ease}\n.check-wrap{width:82px;height:82px;border-radius:50%;background:rgba(46,125,82,.12);display:flex;align-items:center;justify-content:center;margin-bottom:8px;animation:pop .45s cubic-bezier(.2,1.3,.4,1)}\n@keyframes pop{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}\n.check-wrap .circle{width:56px;height:56px;border-radius:50%;background:var(--success);display:flex;align-items:center;justify-content:center}\n.check-wrap svg{width:32px;height:32px;color:#fff}\n.success h2{font-family:var(--font-display);font-weight:800;font-size:23px;margin-top:6px}\n.success .paid-amt{font-family:var(--font-display);font-weight:800;font-size:30px;color:var(--fg1);margin:10px 0 2px}\n.success .paid-sub{color:var(--fg3);font-size:13px;margin-bottom:20px}\n.receipt{width:100%;background:var(--sunk);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px 18px;text-align:left;display:flex;flex-direction:column;gap:1px}\n.receipt .rrow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:13px;border-bottom:1px dashed var(--border)}\n.receipt .rrow:last-child{border-bottom:none}\n.receipt .rrow span{color:var(--fg3)}\n.receipt .rrow b{color:var(--fg1);font-weight:600;font-variant-numeric:tabular-nums}\n.badge-ok{display:inline-flex;align-items:center;gap:6px;background:rgba(46,125,82,.12);color:var(--success);font-weight:700;font-size:12px;padding:3px 10px;border-radius:var(--radius-pill)}\n.badge-pending{background:rgba(237,132,37,.14);color:var(--orange-600)}\n.success-actions{display:flex;gap:10px;width:100%;margin-top:18px}\n.btn-outline{flex:1;border:1.5px solid var(--border-strong);color:var(--fg2);background:#fff;font-weight:600;font-size:13.5px;padding:12px;border-radius:var(--radius-pill);display:flex;align-items:center;justify-content:center;gap:7px;transition:background .15s}\n.btn-outline:hover{background:var(--sunk)}\n.btn-outline svg{width:15px;height:15px}\n.btn-solid{flex:1;background:var(--navy);color:#fff;font-weight:600;font-size:13.5px;padding:12px;border-radius:var(--radius-pill);transition:background .15s}\n.btn-solid:hover{background:var(--navy-700)}\n.email-note{margin-top:16px;font-size:12px;color:var(--fg3);display:flex;align-items:center;gap:7px}\n.email-note svg{width:14px;height:14px;color:var(--navy)}\n\n/* footer */\n.pagefoot{flex-shrink:0;text-align:center;padding:18px;font-size:11.5px;color:var(--fg3)}\n.pagefoot a{color:var(--fg2);text-decoration:none}\n\n.hidden{display:none!important}\n\n@media print{\n  body{background:#fff}\n  .topbar,.summary,.pagefoot,.success-actions,.email-note{display:none!important}\n  .card{box-shadow:none;grid-template-columns:1fr;max-width:100%;border:none}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<header class=\"topbar\">\n  <img src=\"4de222e5-18bf-49dc-8191-14336daed75b\" alt=\"DAUST\">\n  <span class=\"secure-chip\">\n    <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg>\n    Secure payment\n  <\u002Fspan>\n<\u002Fheader>\n\n<main>\n  <div class=\"card\" id=\"card\">\n    <!-- SUMMARY -->\n    <aside class=\"summary\">\n      <div style=\"display:flex;flex-direction:column;gap:11px\">\n        <span class=\"eyebrow\" id=\"sum-eyebrow\">Tuition Payment<\u002Fspan>\n        <div class=\"tri-dash\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"amt-label\">Amount due<\u002Fdiv>\n        <div class=\"amt\" id=\"sum-amount\">—<\u002Fdiv>\n        <div class=\"due-chip\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><path d=\"M16 2v4M8 2v4M3 10h18\"><\u002Fpath><\u002Fsvg>\n          Due <span id=\"sum-due\">—<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"divider\"><\u002Fdiv>\n      <div class=\"profile\">\n        <div class=\"avatar\" id=\"sum-initials\">A<\u002Fdiv>\n        <div>\n          <div class=\"pname\" id=\"sum-name\">—<\u002Fdiv>\n          <div class=\"pmeta\" id=\"sum-meta\">—<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1\"><\u002Fdiv>\n      <div class=\"ref-note\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4M12 8h.01\"><\u002Fpath><\u002Fsvg>\n        <span>Ref <b id=\"sum-ref\">—<\u002Fb> · link expires <span id=\"sum-expiry\">—<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Faside>\n\n    <!-- FORM -->\n    <section class=\"form\" id=\"form\">\n      <!-- REVIEW STATE -->\n      <div id=\"state-review\">\n        <h1>Complete your payment<\u002Fh1>\n        <div class=\"sub\">Choose how you'd like to pay. The amount is set by DAUST Finance and can't be changed.<\u002Fdiv>\n\n        <div class=\"methods\" id=\"methods\">\n          <button class=\"method\" data-method=\"orange\" aria-pressed=\"false\">\n            <span class=\"glyph\" style=\"background:#ff7900\">OM<\u002Fspan>\n            <span><span class=\"mlabel\">Orange Money<\u002Fspan><span class=\"mmeta\">Mobile wallet<\u002Fspan><\u002Fspan>\n            <svg class=\"tick\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n          <button class=\"method\" data-method=\"wave\" aria-pressed=\"false\">\n            <span class=\"glyph\" style=\"background:#1dc4e9\">WV<\u002Fspan>\n            <span><span class=\"mlabel\">Wave<\u002Fspan><span class=\"mmeta\">Mobile wallet<\u002Fspan><\u002Fspan>\n            <svg class=\"tick\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n          <button class=\"method\" data-method=\"card\" aria-pressed=\"false\">\n            <span class=\"glyph\" style=\"background:var(--navy)\">\n              <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" style=\"width:17px;height:17px\"><rect x=\"2\" y=\"5\" width=\"20\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"M2 10h20\"><\u002Fpath><\u002Fsvg>\n            <\u002Fspan>\n            <span><span class=\"mlabel\">Card<\u002Fspan><span class=\"mmeta\">Visa · Mastercard<\u002Fspan><\u002Fspan>\n            <svg class=\"tick\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n          <button class=\"method\" data-method=\"bank\" aria-pressed=\"false\">\n            <span class=\"glyph\" style=\"background:var(--steel)\">\n              <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" style=\"width:17px;height:17px\"><path d=\"M3 21h18M5 21V10l7-5 7 5v11M9 21v-6h6v6\"><\u002Fpath><\u002Fsvg>\n            <\u002Fspan>\n            <span><span class=\"mlabel\">Bank transfer<\u002Fspan><span class=\"mmeta\">CBAO account<\u002Fspan><\u002Fspan>\n            <svg class=\"tick\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n        <\u002Fdiv>\n\n        <!-- method-specific panels -->\n        <div class=\"panel hidden\" id=\"panel-mobile\">\n          <div class=\"field\">\n            <label id=\"mobile-label\">Orange Money number<\u002Flabel>\n            <input type=\"tel\" id=\"mobile-phone\" placeholder=\"+221 77 000 00 00\" value=\"+221 77 xxx xx 09\" autocomplete=\"tel\">\n          <\u002Fdiv>\n          <div class=\"hint\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"5\" y=\"2\" width=\"14\" height=\"20\" rx=\"2\"><\u002Frect><path d=\"M12 18h.01\"><\u002Fpath><\u002Fsvg>\n            <span id=\"mobile-hint\">You'll receive a prompt on this phone to approve the payment with your PIN.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"panel hidden\" id=\"panel-card\">\n          <div class=\"field\">\n            <label>Card number<\u002Flabel>\n            <input type=\"text\" id=\"card-num\" placeholder=\"0000 0000 0000 0000\" inputmode=\"numeric\" maxlength=\"19\">\n          <\u002Fdiv>\n          <div class=\"field\">\n            <div class=\"row2\">\n              <div class=\"field\" style=\"margin:0\">\n                <label>Expiry<\u002Flabel>\n                <input type=\"text\" placeholder=\"MM / YY\" maxlength=\"7\">\n              <\u002Fdiv>\n              <div class=\"field\" style=\"margin:0\">\n                <label>CVV<\u002Flabel>\n                <input type=\"text\" placeholder=\"123\" inputmode=\"numeric\" maxlength=\"4\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"field\">\n            <label>Name on card<\u002Flabel>\n            <input type=\"text\" id=\"card-name\" placeholder=\"Full name\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"panel hidden\" id=\"panel-bank\">\n          <div class=\"bankline\"><span>Bank<\u002Fspan><b>CBAO Attijariwafa<\u002Fb><\u002Fdiv>\n          <div class=\"bankline\"><span>Account name<\u002Fspan><b>DAUST — Tuition Collections<\u002Fb><\u002Fdiv>\n          <div class=\"bankline\"><span>Account no.<\u002Fspan><b>SN045 02110 0073459901 88<\u002Fb><\u002Fdiv>\n          <div class=\"bankline\"><span>Reference to include<\u002Fspan><b id=\"bank-ref\">INV-26-1041<\u002Fb><\u002Fdiv>\n          <div class=\"hint\" style=\"margin-top:12px\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4M12 8h.01\"><\u002Fpath><\u002Fsvg>\n            <span>Transfer the exact amount and include the reference. Upload your proof below, then confirm — Finance will verify it.<\u002Fspan>\n          <\u002Fdiv>\n          <label class=\"upload\" id=\"bank-upload\">\n            <input type=\"file\" id=\"bank-proof\" accept=\"image/*,application/pdf\" hidden=\"\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12\"><\u002Fpath><\u002Fsvg>\n            <span id=\"bank-upload-text\">Upload proof of payment <em>(receipt / screenshot)<\u002Fem><\u002Fspan>\n          <\u002Flabel>\n        <\u002Fdiv>\n\n        <div class=\"spacer\"><\u002Fdiv>\n        <button class=\"pay-btn\" id=\"pay-btn\" disabled=\"\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg>\n          <span id=\"pay-btn-label\">Select a payment method<\u002Fspan>\n        <\u002Fbutton>\n        <div class=\"foot-secure\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z\"><\u002Fpath><\u002Fsvg>\n          256-bit encrypted · DAUST Finance Office\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- PROCESSING STATE -->\n      <div id=\"state-processing\" class=\"processing hidden\">\n        <div class=\"pulse-ring\"><span class=\"glyph-lg\" id=\"proc-glyph\" style=\"background:var(--navy)\">·<\u002Fspan><\u002Fdiv>\n        <div>\n          <h2 id=\"proc-title\">Processing payment<\u002Fh2>\n          <p id=\"proc-msg\">Securely contacting your provider<\u002Fp>\n          <div class=\"dots\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"phone-note hidden\" id=\"proc-phone\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"5\" y=\"2\" width=\"14\" height=\"20\" rx=\"2\"><\u002Frect><path d=\"M12 18h.01\"><\u002Fpath><\u002Fsvg>\n          <span>Check your phone and approve the payment request with your secret code.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- SUCCESS STATE -->\n      <div id=\"state-success\" class=\"success hidden\">\n        <div class=\"check-wrap\"><div class=\"circle\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv><\u002Fdiv>\n        <h2 id=\"succ-title\">Payment successful<\u002Fh2>\n        <div class=\"paid-amt\" id=\"succ-amount\">—<\u002Fdiv>\n        <div class=\"paid-sub\" id=\"succ-sub\">Thank you — your account has been credited.<\u002Fdiv>\n\n        <div class=\"receipt\">\n          <div class=\"rrow\"><span>Status<\u002Fspan><span class=\"badge-ok\" id=\"succ-badge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" style=\"width:12px;height:12px\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg> Paid<\u002Fspan><\u002Fdiv>\n          <div class=\"rrow\"><span>Receipt no.<\u002Fspan><b id=\"succ-receipt\">—<\u002Fb><\u002Fdiv>\n          <div class=\"rrow\"><span>Invoice<\u002Fspan><b id=\"succ-invoice\">—<\u002Fb><\u002Fdiv>\n          <div class=\"rrow\"><span>Payer<\u002Fspan><b id=\"succ-payer\">—<\u002Fb><\u002Fdiv>\n          <div class=\"rrow\"><span>Method<\u002Fspan><b id=\"succ-method\">—<\u002Fb><\u002Fdiv>\n          <div class=\"rrow hidden\" id=\"succ-proof-row\"><span>Proof of payment<\u002Fspan><b id=\"succ-proof\">—<\u002Fb><\u002Fdiv>\n          <div class=\"rrow\"><span>Date<\u002Fspan><b id=\"succ-date\">—<\u002Fb><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"success-actions\">\n          <button class=\"btn-outline\" onclick=\"window.print()\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z\"><\u002Fpath><\u002Fsvg>\n            Receipt\n          <\u002Fbutton>\n          <button class=\"btn-solid\" id=\"succ-done\">Done<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"email-note\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"2\" y=\"4\" width=\"20\" height=\"16\" rx=\"2\"><\u002Frect><path d=\"m22 7-10 5L2 7\"><\u002Fpath><\u002Fsvg>\n          A copy has been emailed to <span id=\"succ-email\" style=\"margin-left:3px;font-weight:600;color:var(--fg2)\">&nbsp;<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n<\u002Fmain>\n\n<div class=\"pagefoot\">\n  Powered by <strong style=\"color:var(--fg2)\">DAUST&nbsp;Pay<\u002Fstrong> · Dakar American University of Science &amp; Technology · <a href=\"mailto:finance@daust.edu.sn\">finance@daust.edu.sn<\u002Fa>\n<\u002Fdiv>\n\n\n\n<script>\n(function(){\n  var fmt = function(n){ return new Intl.NumberFormat('fr-FR').format(Math.round(n)); };\n  var qs = new URLSearchParams(location.search);\n\n  // ---- Profiled invoice (URL params override defaults) ----\n  var data = {\n    ref:      qs.get('ref')     || 'INV-26-1041',\n    name:     qs.get('name')    || 'Awa Diop',\n    id:       qs.get('id')      || 'DA24003',\n    program:  qs.get('program') || 'Computer Science',\n    email:    qs.get('email')   || 'adiop@daust.edu.sn',\n    amount: parseInt(qs.get('amount'), 10) || 1925000,\n    due:      qs.get('due')     || '15 Jul 2026',\n    expiry:   qs.get('expiry')  || '18 Jul 2026',\n    term:     qs.get('term')    || 'Tuition Payment'\n  };\n  var initials = data.name.split(' ').map(function(w){return w[0];}).slice(0,2).join('').toUpperCase();\n\n  // ---- Fill summary ----\n  document.getElementById('sum-eyebrow').textContent = data.term;\n  document.getElementById('sum-amount').innerHTML = fmt(data.amount) + '<small>FCFA<\u002Fsmall>';\n  document.getElementById('sum-due').textContent = data.due;\n  document.getElementById('sum-initials').textContent = initials;\n  document.getElementById('sum-name').textContent = data.name;\n  document.getElementById('sum-meta').textContent = data.id + ' · ' + data.program;\n  document.getElementById('sum-ref').textContent = data.ref;\n  document.getElementById('sum-expiry').textContent = data.expiry;\n  document.getElementById('bank-ref').textContent = data.ref;\n\n  // ---- Method selection ----\n  var METHODS = {\n    orange: {label:'Orange Money', glyph:'OM', color:'#ff7900', panel:'panel-mobile', mobile:true, mlabel:'Orange Money number', hint:\"You'll receive a prompt on this phone to approve the payment with your Orange Money PIN.\"},\n    wave:   {label:'Wave',         glyph:'WV', color:'#1dc4e9', panel:'panel-mobile', mobile:true, mlabel:'Wave number', hint:\"Open your Wave app to confirm the payment request we send to this number.\"},\n    card:   {label:'Card',         glyph:'💳', color:'#153b6a', panel:'panel-card', mobile:false},\n    bank:   {label:'Bank transfer',glyph:'🏦', color:'#9da6ae', panel:'panel-bank', mobile:false, async:true}\n  };\n  var selected = null;\n  var panels = ['panel-mobile','panel-card','panel-bank'];\n  var payBtn = document.getElementById('pay-btn');\n  var payLabel = document.getElementById('pay-btn-label');\n  var methodsWrap = document.getElementById('methods');\n\n  // proof of payment upload (bank transfer)\n  var proofName = null;\n  var proofInput = document.getElementById('bank-proof');\n  var uploadEl = document.getElementById('bank-upload');\n  var uploadText = document.getElementById('bank-upload-text');\n  if(proofInput){\n    proofInput.addEventListener('change', function(){\n      if(proofInput.files && proofInput.files[0]){\n        proofName = proofInput.files[0].name;\n        uploadText.innerHTML = 'Proof attached — ' + proofName;\n        uploadEl.classList.add('done');\n      }\n    });\n  }\n\n  document.querySelectorAll('.method').forEach(function(btn){\n    btn.addEventListener('click', function(){\n      selected = btn.getAttribute('data-method');\n      methodsWrap.classList.add('has-selection');\n      document.querySelectorAll('.method').forEach(function(b){ b.setAttribute('aria-pressed', b===btn ? 'true':'false'); });\n      var m = METHODS[selected];\n      panels.forEach(function(p){ document.getElementById(p).classList.toggle('hidden', p!==m.panel); });\n      if(m.mobile){\n        document.getElementById('mobile-label').textContent = m.mlabel;\n        document.getElementById('mobile-hint').textContent = m.hint;\n      }\n      payBtn.disabled = false;\n      payLabel.textContent = m.async ? \"I've completed the transfer\" : ('Pay ' + fmt(data.amount) + ' FCFA');\n    });\n  });\n\n  // ---- Pay flow ----\n  function show(state){\n    document.getElementById('state-review').classList.toggle('hidden', state!=='review');\n    document.getElementById('state-processing').classList.toggle('hidden', state!=='processing');\n    document.getElementById('state-success').classList.toggle('hidden', state!=='success');\n  }\n\n  payBtn.addEventListener('click', function(){\n    var m = METHODS[selected];\n    if(m.async){ return finish(true); }        // bank transfer → pending receipt\n    // processing\n    show('processing');\n    document.getElementById('proc-glyph').style.background = m.color;\n    document.getElementById('proc-glyph').textContent = m.mobile ? m.glyph : '';\n    if(!m.mobile){\n      document.getElementById('proc-glyph').innerHTML = '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" style=\"width:26px;height:26px\"><rect x=\"2\" y=\"5\" width=\"20\" height=\"14\" rx=\"2\"/><path d=\"M2 10h20\"/><\u002Fsvg>';\n    }\n    var phoneNote = document.getElementById('proc-phone');\n    var title = document.getElementById('proc-title');\n    var msg = document.getElementById('proc-msg');\n\n    if(m.mobile){\n      title.textContent = 'Requesting approval';\n      msg.textContent = 'Sending a payment request to ' + m.label;\n      setTimeout(function(){\n        title.textContent = 'Waiting for you to approve';\n        msg.textContent = 'Approve the request on your phone to complete payment';\n        phoneNote.classList.remove('hidden');\n      }, 1600);\n      setTimeout(function(){ finish(false); }, 4200);\n    } else {\n      title.textContent = 'Processing payment';\n      msg.textContent = 'Securely authorising your card';\n      setTimeout(function(){ finish(false); }, 2400);\n    }\n  });\n\n  function finish(pending){\n    var m = METHODS[selected];\n    var now = new Date();\n    var dateStr = now.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) + ' · ' +\n                  now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});\n    var receiptNo = 'RCP-' + now.getFullYear() + '-' + Math.floor(100000 + Math.random()*899999);\n\n    document.getElementById('succ-amount').innerHTML = fmt(data.amount) + ' <span style=\"font-size:.5em;color:var(--fg3)\">FCFA<\u002Fspan>';\n    document.getElementById('succ-receipt').textContent = receiptNo;\n    document.getElementById('succ-invoice').textContent = data.ref;\n    document.getElementById('succ-payer').textContent = data.name + ' (' + data.id + ')';\n    document.getElementById('succ-method').textContent = m.label;\n    var proofRow = document.getElementById('succ-proof-row');\n    if(selected==='bank'){\n      proofRow.classList.remove('hidden');\n      document.getElementById('succ-proof').textContent = proofName ? proofName : 'Not attached';\n    } else { proofRow.classList.add('hidden'); }\n    document.getElementById('succ-date').textContent = dateStr;\n    document.getElementById('succ-email').textContent = data.email;\n\n    var badge = document.getElementById('succ-badge');\n    if(pending){\n      document.getElementById('succ-title').textContent = 'Transfer registered';\n      document.getElementById('succ-sub').textContent = 'We\\u2019ll confirm once the funds arrive (usually 1 business day).';\n      badge.className = 'badge-ok badge-pending';\n      badge.innerHTML = '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" style=\"width:12px;height:12px\"><circle cx=\"12\" cy=\"12\" r=\"9\"/><path d=\"M12 7v5l3 2\"/><\u002Fsvg> Pending';\n      document.querySelector('.check-wrap .circle').style.background = 'var(--orange)';\n    }\n    show('success');\n    try{ document.getElementById('card').scrollIntoView({block:'nearest'}); }catch(e){}\n  }\n\n  document.getElementById('succ-done').addEventListener('click', function(){\n    // reset back to review (demo convenience)\n    show('review');\n    selected=null; payBtn.disabled=true; payLabel.textContent='Select a payment method';\n    methodsWrap.classList.remove('has-selection');\n    document.querySelectorAll('.method').forEach(function(b){b.setAttribute('aria-pressed','false');});\n    panels.forEach(function(p){document.getElementById(p).classList.add('hidden');});\n    document.getElementById('proc-phone').classList.add('hidden');\n    window.scrollTo(0,0);\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
